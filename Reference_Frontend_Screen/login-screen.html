<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kassensystem — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#e8e8e8;display:flex;align-items:flex-start;justify-content:center;padding:32px;min-height:100vh;}

.app{
  --bg:#f5f4f1;--sur:#ffffff;--sur2:#eceae5;--text:#1a1a1f;--text2:#9a98a8;--brd:rgba(26,26,31,0.08);
  --acc:#1a6fff;--acc-bg:#e8f0ff;--acc-t:#0a3dbf;
  --free-bg:#e8f5ec;--free-t:#1a5c30;
  --dan-bg:#ffeef0;--dan-t:#c0112a;
  width:1100px;border-radius:18px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.12);
  display:grid;grid-template-columns:1fr 420px;min-height:640px;
}
.app.dark{
  --bg:#13131a;--sur:#1c1c26;--sur2:#252535;--text:#eeeef8;--text2:#6a6888;--brd:rgba(238,238,248,0.07);
  --acc:#4d8fff;--acc-bg:#0d1f50;--acc-t:#90bbff;
  --free-bg:#0d2818;--free-t:#60d080;
  --dan-bg:#2a0a10;--dan-t:#ff7088;
}

/* ── LEFT: Branding ── */
.left-panel{background:var(--acc);display:flex;flex-direction:column;justify-content:space-between;padding:36px 40px;}
.app.dark .left-panel{background:#0a1a40;}
.lp-top{}
.lp-brand{display:flex;align-items:center;gap:11px;}
.lp-brand-dot{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;}
.lp-brand-dot svg{width:14px;height:14px;fill:white;}
.lp-brand-name{font-size:16px;font-weight:600;color:white;letter-spacing:-0.3px;}
.lp-tagline{font-size:26px;font-weight:600;color:white;line-height:1.3;margin-top:40px;letter-spacing:-0.5px;}
.lp-tagline span{opacity:0.6;}
.lp-bottom{}
.lp-meta{font-size:11px;color:rgba(255,255,255,0.5);line-height:1.8;}
.lp-meta strong{color:rgba(255,255,255,0.8);font-weight:600;}
.tgl-wrap{display:flex;align-items:center;gap:8px;margin-top:16px;}
.tgl-label{font-size:11px;color:rgba(255,255,255,0.5);}
.tgl{width:38px;height:22px;border-radius:11px;background:rgba(255,255,255,0.2);cursor:pointer;position:relative;border:1px solid rgba(255,255,255,0.2);}
.tgl::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.5);top:2px;left:2px;transition:transform .2s,background .2s;}
.app.dark .tgl::after{transform:translateX(16px);background:var(--acc);}

/* ── RIGHT: Login ── */
.right-panel{background:var(--sur);display:flex;flex-direction:column;padding:32px;}

/* User selection */
.user-select-label{font-size:10px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text2);margin-bottom:12px;font-weight:600;}
.user-list{display:flex;flex-direction:column;gap:6px;margin-bottom:24px;}
.user-card{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;border:1.5px solid var(--brd);cursor:pointer;transition:all .15s;}
.user-card:hover{border-color:rgba(26,111,255,0.3);}
.user-card.selected{border-color:var(--acc);background:var(--acc-bg);}
.user-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.user-av-n{background:var(--acc-bg);color:var(--acc-t);}
.user-av-a{background:#fff3e0;color:#8a5010;}
.app.dark .user-av-a{background:#2e1f0a;color:#f0a840;}
.user-av-s{background:var(--sur2);color:var(--text2);}
.user-info{flex:1;}
.user-name{font-size:13px;font-weight:600;color:var(--text);}
.user-card.selected .user-name{color:var(--acc-t);}
.user-role{font-size:10px;color:var(--text2);margin-top:1px;}
.user-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--brd);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.user-card.selected .user-check{background:var(--acc);border-color:var(--acc);}
.user-check svg{width:10px;height:10px;stroke:white;fill:none;stroke-width:2.5;opacity:0;}
.user-card.selected .user-check svg{opacity:1;}

/* Divider */
.divider{height:1px;background:var(--brd);margin-bottom:20px;}

/* PIN section */
.pin-section{flex:1;display:flex;flex-direction:column;}
.pin-label{font-size:10px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text2);margin-bottom:12px;font-weight:600;}
.pin-user-hint{font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px;}
.pin-user-hint span{color:var(--acc);}

/* PIN dots */
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:20px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--brd);background:transparent;transition:all .15s;}
.pin-dot.filled{background:var(--acc);border-color:var(--acc);}
.pin-dot.error{background:var(--dan-t);border-color:var(--dan-t);}

/* PIN error */
.pin-error{font-size:11px;color:var(--dan-t);text-align:center;margin-bottom:10px;min-height:16px;font-weight:500;}

/* PIN Numpad */
.pin-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pn-btn{height:52px;border-radius:12px;border:1px solid var(--brd);background:var(--bg);font-size:18px;font-weight:600;color:var(--text);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:background .1s,transform .1s;}
.pn-btn:hover{background:var(--sur2);}
.pn-btn:active{transform:scale(0.95);}
.pn-sub{font-size:8px;letter-spacing:1px;color:var(--text2);font-weight:500;}
.pn-btn.del{background:var(--sur2);font-size:14px;color:var(--text2);}
.pn-btn.del svg{width:18px;height:18px;stroke:var(--text2);fill:none;stroke-width:2;}
.pn-btn.del:hover{background:var(--dan-bg);}
.pn-btn.del:hover svg{stroke:var(--dan-t);}
.pn-btn.empty{background:transparent;border-color:transparent;cursor:default;}
.pn-btn.enter{background:var(--acc);color:white;border-color:var(--acc);}
.pn-btn.enter:hover{opacity:0.9;}
.pn-btn.enter svg{width:20px;height:20px;stroke:white;fill:none;stroke-width:2.2;}

/* Password fallback */
.pw-fallback{text-align:center;margin-top:14px;}
.pw-link{font-size:11px;color:var(--text2);background:none;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.pw-link:hover{color:var(--acc-t);}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Left: Branding -->
  <div class="left-panel">
    <div class="lp-top">
      <div class="lp-brand">
        <div class="lp-brand-dot"><svg viewBox="0 0 14 14"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="8" y="1" width="5" height="5" rx="1"/><rect x="1" y="8" width="5" height="5" rx="1"/><rect x="8" y="8" width="5" height="5" rx="1"/></svg></div>
        <span class="lp-brand-name">Kassensystem</span>
      </div>
      <div class="lp-tagline">Guten Morgen,<br/><span>bereit für die</span><br/>neue Schicht.</div>
    </div>
    <div class="lp-bottom">
      <div class="lp-meta">
        <strong>Shishabar Mustermann</strong><br/>
        iPad Theke · Frankfurt<br/>
        18. März 2026 · 08:00 Uhr
      </div>
      <div class="tgl-wrap">
        <span class="tgl-label">Dark Mode</span>
        <div class="tgl" id="tgl"></div>
      </div>
    </div>
  </div>

  <!-- Right: Login -->
  <div class="right-panel">

    <div class="user-select-label">Wer bist du?</div>
    <div class="user-list">
      <div class="user-card selected" onclick="selectUser(this,'Niko','N','user-av-n')">
        <div class="user-avatar user-av-n">N</div>
        <div class="user-info">
          <div class="user-name">Niko Mustermann</div>
          <div class="user-role">Owner</div>
        </div>
        <div class="user-check"><svg viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg></div>
      </div>
      <div class="user-card" onclick="selectUser(this,'Ali','A','user-av-a')">
        <div class="user-avatar user-av-a">A</div>
        <div class="user-info">
          <div class="user-name">Ali Yilmaz</div>
          <div class="user-role">Manager</div>
        </div>
        <div class="user-check"><svg viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg></div>
      </div>
      <div class="user-card" onclick="selectUser(this,'Sara','S','user-av-s')">
        <div class="user-avatar user-av-s">S</div>
        <div class="user-info">
          <div class="user-name">Sara Kaya</div>
          <div class="user-role">Staff</div>
        </div>
        <div class="user-check"><svg viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="pin-section">
      <div class="pin-label">PIN eingeben</div>
      <div class="pin-user-hint">Hallo, <span id="pin-user-name">Niko</span> 👋</div>

      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
      </div>

      <div class="pin-error" id="pin-error"></div>

      <div class="pin-numpad">
        <button class="pn-btn" onclick="pinKey('1')">1</button>
        <button class="pn-btn" onclick="pinKey('2')">2<div class="pn-sub">ABC</div></button>
        <button class="pn-btn" onclick="pinKey('3')">3<div class="pn-sub">DEF</div></button>
        <button class="pn-btn" onclick="pinKey('4')">4<div class="pn-sub">GHI</div></button>
        <button class="pn-btn" onclick="pinKey('5')">5<div class="pn-sub">JKL</div></button>
        <button class="pn-btn" onclick="pinKey('6')">6<div class="pn-sub">MNO</div></button>
        <button class="pn-btn" onclick="pinKey('7')">7<div class="pn-sub">PQRS</div></button>
        <button class="pn-btn" onclick="pinKey('8')">8<div class="pn-sub">TUV</div></button>
        <button class="pn-btn" onclick="pinKey('9')">9<div class="pn-sub">WXYZ</div></button>
        <button class="pn-btn empty"></button>
        <button class="pn-btn" onclick="pinKey('0')">0</button>
        <button class="pn-btn del" onclick="pinKey('del')"><svg viewBox="0 0 18 18"><polyline points="7,5 2,9 7,13"/><line x1="2" y1="9" x2="16" y2="9"/></svg></button>
      </div>

      <div class="pw-fallback">
        <button class="pw-link">PIN vergessen? Mit Passwort anmelden →</button>
      </div>
    </div>

  </div>
</div>

<script>
  document.getElementById('tgl').addEventListener('click', () => document.getElementById('app').classList.toggle('dark'));

  let pin = '';
  const CORRECT = '1234'; // Demo PIN

  function selectUser(el, name, initial, avatarClass) {
    document.querySelectorAll('.user-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('pin-user-name').textContent = name;
    resetPin();
  }

  function pinKey(k) {
    clearError();
    if (k === 'del') {
      pin = pin.slice(0,-1);
    } else if (pin.length < 4) {
      pin += k;
    }
    updateDots();
    if (pin.length === 4) {
      setTimeout(checkPin, 150);
    }
  }

  function updateDots() {
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById('d' + i);
      d.classList.toggle('filled', i < pin.length);
      d.classList.remove('error');
    }
  }

  function checkPin() {
    if (pin === CORRECT) {
      // Success — flash green
      for (let i = 0; i < 4; i++) {
        const d = document.getElementById('d' + i);
        d.style.background = 'var(--free-t)';
        d.style.borderColor = 'var(--free-t)';
      }
      document.getElementById('pin-error').style.color = 'var(--free-t)';
      document.getElementById('pin-error').textContent = '✓ Angemeldet — Weiterleitung …';
      setTimeout(resetPin, 1800);
    } else {
      // Error shake
      for (let i = 0; i < 4; i++) {
        document.getElementById('d' + i).classList.add('error');
      }
      document.getElementById('pin-error').textContent = 'Falscher PIN. Bitte erneut versuchen.';
      setTimeout(resetPin, 1200);
    }
  }

  function resetPin() {
    pin = '';
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById('d' + i);
      d.classList.remove('filled','error');
      d.style.background = '';
      d.style.borderColor = '';
    }
    clearError();
  }

  function clearError() {
    document.getElementById('pin-error').textContent = '';
    document.getElementById('pin-error').style.color = '';
  }
</script>
</body>
</html>
