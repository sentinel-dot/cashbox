name: CI

# PR-Gate für main: keine Änderung kommt rein, ohne dass Typecheck + alle
# Backend-Suiten gegen eine echte MariaDB grün durchlaufen.
# Bewusst ohne paths-Filter: ein übersprungener Required Check würde PRs
# dauerhaft blockieren.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (tsc + unit + integration)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      mariadb:
        image: mariadb:11.4
        env:
          # Wegwerf-Passwort für den Testlauf; muss zu DB_ADMIN_PASSWORD unten passen.
          MARIADB_ROOT_PASSWORD: root
        # Port-Mapping ist Pflicht, kein Container-Job mit Service-Hostname:
        # src/__tests__/setup.ts lädt .env.test mit override: true, damit gilt
        # im Testlauf zwingend DB_HOST=localhost / DB_PORT=3306.
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      # setup-db.ts / migrate.ts / db/index.ts laden dotenv OHNE override —
      # diese Werte gewinnen also gegenüber .env.test.
      DB_ADMIN_PASSWORD: root
      # Verbindungen kommen aus dem Docker-Netz, nicht von localhost.
      DB_USER_HOST: '%'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Berichte nutzen CONVERT_TZ(…, 'Europe/Berlin') (reportsController,
      # receiptsController). Ohne geladene Timezone-Tabellen liefert das NULL —
      # Report-Tests wären dann still 0 statt rot.
      - name: MariaDB-Timezone-Tabellen laden
        working-directory: .
        run: |
          docker exec ${{ job.services.mariadb.id }} sh -c \
            'mariadb-tzinfo-to-sql /usr/share/zoneinfo 2>/dev/null | mariadb -uroot -proot mysql'

      - name: Timezone-Tabellen verifizieren
        working-directory: .
        run: |
          RESULT=$(docker exec ${{ job.services.mariadb.id }} \
            mariadb -uroot -proot -N -B -e \
            "SELECT IFNULL(CONVERT_TZ(NOW(), '+00:00', 'Europe/Berlin'), 'NULL')")
          echo "CONVERT_TZ → $RESULT"
          if [ "$RESULT" = "NULL" ]; then
            echo "::error::Timezone-Tabellen fehlen — alle Berichte lieferten 0. Abbruch."
            exit 1
          fi

      - name: Dependencies installieren
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Legt cashbox_test + die drei DB-User mit ihren Grants an und fährt die
      # Migrations hoch (identische Logik wie lokal — keine CI-Sonderpfade).
      - name: Test-DB aufsetzen
        run: npm run db:setup:test

      - name: Unit- + Compliance-Tests
        run: npm test

      - name: Integrationstests
        run: npm run test:integration

  ios:
    name: iOS (xcodebuild test)
    # macos-26 ist nötig, nicht Geschmackssache: das Test-Target hat
    # IPHONEOS_DEPLOYMENT_TARGET = 26.2, das braucht Xcode 26 + eine
    # iOS-26.2-Simulator-Runtime. macos-latest zeigt derzeit auf macOS 15
    # (Xcode 16) und würde scheitern. Das Image ist bei GitHub noch als
    # Preview markiert — bewusst akzeptiert (S02), Alternative wäre, das
    # Test-Target auf 18.2 zu senken (OFFEN.md T7).
    runs-on: macos-26

    defaults:
      run:
        working-directory: zettel-frontend

    steps:
      - uses: actions/checkout@v5

      # Die verfügbaren Simulatoren unterscheiden sich je Runner-Image, deshalb
      # keine feste Destination: neuestes iOS-Runtime nehmen, darin das erste
      # iPad (die App ist iPad-only, TARGETED_DEVICE_FAMILY=2).
      - name: iPad-Simulator wählen
        id: sim
        run: |
          SELECT='.devices
            | to_entries
            | map(select(.key | test("SimRuntime\\.iOS-")))
            | map({
                ver: (.key | capture("iOS-(?<a>[0-9]+)-(?<b>[0-9]+)")
                            | (.a | tonumber) * 1000 + (.b | tonumber)),
                devs: .value
              })
            | sort_by(.ver) | reverse
            | map(.devs | map(select(.name | test("iPad"))))
            | flatten | .[0]'
          JSON=$(xcrun simctl list devices available --json)
          UDID=$(echo "$JSON" | jq -r "$SELECT | .udid // empty")
          NAME=$(echo "$JSON" | jq -r "$SELECT | .name // empty")
          if [ -z "$UDID" ]; then
            echo "::error::Kein iPad-Simulator auf dem Runner gefunden."
            xcrun simctl list devices available
            exit 1
          fi
          echo "Gewählt: $NAME ($UDID)"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: XCTest-Suite
        run: |
          xcodebuild test \
            -project zettel-frontend.xcodeproj \
            -scheme zettel-frontend \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Result-Bundle sichern (nur bei Fehlschlag)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: zettel-frontend/TestResults.xcresult
          retention-days: 7
